name: MeetingTranscriber
options:
  bundleIdPrefix: com.czlonkowski
  deploymentTarget:
    macOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "MeetingTranscriber Local"
    ENABLE_HARDENED_RUNTIME: YES
    # Don't let Xcode inject com.apple.security.get-task-allow (debuggable) —
    # EventKit's in-process pre-flight refuses to show the Calendar permission
    # prompt for a debuggable client, so the request self-denies silently.
    CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: NO
    INFOPLIST_FILE: MeetingTranscriber/Resources/Info.plist
    CODE_SIGN_ENTITLEMENTS: MeetingTranscriber/Resources/MeetingTranscriber.entitlements
    PRODUCT_BUNDLE_IDENTIFIER: com.czlonkowski.MeetingTranscriber
    SWIFT_STRICT_CONCURRENCY: minimal
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit
    from: "0.9.0"
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio
    from: "0.12.0"
  mlx-swift-lm:
    url: https://github.com/ml-explore/mlx-swift-lm
    from: "3.31.3"
  swift-transformers:
    url: https://github.com/huggingface/swift-transformers
    from: "1.1.6"
  swift-huggingface:
    url: https://github.com/huggingface/swift-huggingface
    from: "0.8.1"
  swift-sdk:
    url: https://github.com/modelcontextprotocol/swift-sdk
    from: "0.12.0"
targets:
  MeetingTranscriber:
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: MeetingTranscriber
    resources:
      - path: MeetingTranscriber/Resources/meeting-patterns.json
      - path: MeetingTranscriber/Resources/Assets.xcassets
    dependencies:
      - package: WhisperKit
        product: WhisperKit
      - package: FluidAudio
        product: FluidAudio
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: mlx-swift-lm
        product: MLXHuggingFace
      - package: swift-transformers
        product: Tokenizers
      - package: swift-huggingface
        product: HuggingFace
      - package: swift-sdk
        product: MCP
    info:
      path: MeetingTranscriber/Resources/Info.plist
      properties:
        CFBundleName: Meeting Transcriber
        CFBundleDisplayName: Meeting Transcriber
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleIconFile: AppIcon
        CFBundleIconName: AppIcon
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: "26.0"
        LSApplicationCategoryType: public.app-category.productivity
        NSHumanReadableCopyright: "© 2026 Romuald Członkowski"
        NSMicrophoneUsageDescription: "Meeting Transcriber records your microphone while you record a meeting."
        NSAppleEventsUsageDescription: "Meeting Transcriber asks Arc, Safari, and Chrome for the current tab URL to detect meetings you join."
        NSCalendarsUsageDescription: "Meeting Transcriber reads your calendar to remind you when a call is about to start."
        NSCalendarsFullAccessUsageDescription: "Meeting Transcriber reads your calendar to remind you when a call is about to start and offer to record it."
        NSDesktopFolderUsageDescription: "Needed only if you import files from the Desktop."
        NSDocumentsFolderUsageDescription: "Meeting Transcriber saves transcripts to your Documents folder."
        NSDownloadsFolderUsageDescription: "Needed only if you import files from Downloads."
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: false
        LSUIElement: false
